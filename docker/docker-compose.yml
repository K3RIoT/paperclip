services:
  paperclip-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${PAPERCLIP_DB_USER}
      POSTGRES_PASSWORD: ${PAPERCLIP_DB_PASSWORD}
      POSTGRES_DB: ${PAPERCLIP_DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAPERCLIP_DB_USER} -d ${PAPERCLIP_DB_NAME}"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  paperclip-server:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: paperclip-server
    environment:
      DATABASE_URL: postgres://${PAPERCLIP_DB_USER}:${PAPERCLIP_DB_PASSWORD}@paperclip-db:5432/${PAPERCLIP_DB_NAME}
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: ${PAPERCLIP_PUBLIC_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      PAPERCLIP_AGENT_JWT_SECRET: ${PAPERCLIP_AGENT_JWT_SECRET}
      PAPERCLIP_API_URL: "http://paperclip-server:3100"
      PAPERCLIP_ALLOWED_HOSTNAMES: "paperclip-server"
    volumes:
      - paperclip-data:/paperclip
      - paperclip_config:/paperclip
    depends_on:
      paperclip-db:
        condition: service_healthy
    networks:
      - internal
      - appnet

volumes:
  pgdata:
  paperclip-data:
  paperclip_config:

networks:
  internal:
  appnet:
    external: true
